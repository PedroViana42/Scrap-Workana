name: Workana Scraper CI

on:
  schedule:
    - cron: '0 * * * *'  # Roda a cada 1 hora
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: telegram    # Adicionado para acessar os segredo do Environment "telegram"
    permissions:
      contents: write    # Necessário para fazer o push do banco de dados

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Google Chrome
        run: |
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install ./google-chrome-stable_current_amd64.deb

      - name: Clear ChromeDriver cache
        run: rm -rf ~/.wdm

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GITHUB_ACTIONS: "true"
        run: python scraper.py

      - name: Persist Database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update vagas database [skip ci]"
          file_pattern: 'vagas.db'
          push_options: '--force' 
          skip_fetch: false
          skip_checkout: false
          disable_globbing: true

      - name: Notify Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.CHAT_ID }}" \
            -d "text=⚠️ *ERRO NO SCRAPER!* O bot do Workana falhou no GitHub Actions. Verifique os logs." \
            -d "parse_mode=Markdown"
